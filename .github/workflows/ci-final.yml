name: CI - Final Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Find and move to project root
        shell: powershell
        run: |
          Write-Host "Looking for pom.xml..."
          $pomPath = Get-ChildItem -Recurse -Filter "pom.xml" | Select-Object -First 1 -ExpandProperty DirectoryName
          Write-Host "Found pom.xml in: $pomPath"
          echo "PROJECT_ROOT=$pomPath" >> $env:GITHUB_ENV

      - name: Deploy Maven settings
        shell: powershell
        run: |
          $settingsFile = Get-ChildItem -Path "$env:PROJECT_ROOT" -Recurse -Filter "settings.xml" | Select-Object -First 1 -ExpandProperty FullName
          if ($settingsFile) {
            New-Item -Path "$env:USERPROFILE\.m2" -ItemType Directory -Force
            Copy-Item $settingsFile -Destination "$env:USERPROFILE\.m2\settings.xml" -Force
            Write-Host "✅ settings.xml copied from: $settingsFile"
            Write-Host "✅ Destination: $env:USERPROFILE\.m2\settings.xml"
          } else {
            Write-Host "⚠️ settings.xml not found in repository"
            Write-Host "⚠️ Build may fail with 401 Unauthorized"
          }

      - name: Run Maven tests
        run: |
          cd "$env:PROJECT_ROOT"
          Write-Host "Now in: $(Get-Location)"
          mvn clean test

      - name: Build JAR
        run: |
          cd "$env:PROJECT_ROOT"
          mvn package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: search-engine-jar
          path: '**/target/*.jar'