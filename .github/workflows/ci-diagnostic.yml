name: CI Diagnostic

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show full structure (Windows)
        run: |
          Write-Host "=== Current directory ==="
          Get-Location
          Write-Host "=== Root files ==="
          Get-ChildItem -Force
          Write-Host "=== Searching for pom.xml ==="
          Get-ChildItem -Recurse -Filter "pom.xml" | Select-Object FullName

